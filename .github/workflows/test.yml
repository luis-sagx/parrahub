name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpassword
          POSTGRES_DB: chatdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: chatuser
          MONGO_INITDB_ROOT_PASSWORD: chatpassword
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:generate
      - run: pnpm run test:cov
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb
          MONGODB_URI: mongodb://chatuser:chatpassword@localhost:27017/chatdb?authSource=admin
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret
          MINIO_ENDPOINT: localhost
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: chat-files
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:coverage

  k6-load-test:
    runs-on: ubuntu-latest
    needs: test-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpassword
          POSTGRES_DB: chatdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatuser -d chatdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: chatuser
          MONGO_INITDB_ROOT_PASSWORD: chatpassword
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data --console-address ":9001"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Setup backend
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm run db:generate
          pnpm exec prisma migrate deploy
          pnpm run db:seed
          pnpm run build
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MESSAGE_ENCRYPTION_KEY: ${{ secrets.MESSAGE_ENCRYPTION_KEY }}
      - name: Start backend and run k6 load test
        run: |
          set -euo pipefail

          BACKEND_LOG="$RUNNER_TEMP/backend-k6.log"

          cleanup() {
            if [ -n "${BACKEND_PID:-}" ] && kill -0 "$BACKEND_PID" 2>/dev/null; then
              kill "$BACKEND_PID" 2>/dev/null || true
              wait "$BACKEND_PID" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT

          cd backend
          pnpm run start:prod > "$BACKEND_LOG" 2>&1 &
          BACKEND_PID=$!
          cd ..

          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if ! kill -0 "$BACKEND_PID" 2>/dev/null; then
              echo "Backend exited before becoming ready"
              cat "$BACKEND_LOG"
              exit 1
            fi

            # Usar endpoint GET público
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/api/rooms/public | grep -q "200\|401"; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

          if ! curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/api/rooms/public | grep -q "200\|401"; then
            echo "Backend did not become ready in time"
            cat "$BACKEND_LOG"
            exit 1
          fi

          docker run --rm --network host \
            -v "$PWD:/work" \
            -w /work \
            -e BASE_URL \
            -e ADMIN_USERNAME \
            -e ADMIN_PASSWORD \
            grafana/k6 run k6/load-test.js

          echo "k6 load test finished successfully"
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb
          MONGODB_URI: mongodb://chatuser:chatpassword@localhost:27017/chatdb?authSource=admin
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret
          MINIO_ENDPOINT: localhost
          MINIO_PORT: 9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: chat-files
          PORT: 3000
          BASE_URL: http://localhost:3000/api
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: Admin1234!
          MESSAGE_ENCRYPTION_KEY: 01e2e3d4e5f607182938475664738394545566778899000aabbcccddeeff001122
