version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: chat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword
      POSTGRES_DB: chatdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chatuser -d chatdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: chat_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: chatuser
      MONGO_INITDB_ROOT_PASSWORD: chatpassword
      MONGO_INITDB_DATABASE: chatdb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: chat_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    container_name: chat_backend
    restart: unless-stopped
    command: pnpm run start:dev
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://chatuser:chatpassword@postgres:5432/chatdb
      MONGODB_URI: mongodb://chatuser:chatpassword@mongodb:27017/chatdb?authSource=admin
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_ENDPOINT: 187.124.233.120:9002
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: chat-files
      PORT: 3000
    ports:
      - "3001:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: chat_frontend
    restart: unless-stopped
    command: pnpm run dev --host 0.0.0.0
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker/nginx
    container_name: chat_nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      FRONTEND_UPSTREAM: frontend:5173
      BACKEND_UPSTREAM: backend:3000
    ports:
      - "8085:80"
    depends_on:
      - frontend
      - backend

  adminer:
    image: adminer
    container_name: chat_adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express
    container_name: chat_mongo_express
    restart: unless-stopped
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: chatuser
      ME_CONFIG_MONGODB_ADMINPASSWORD: chatpassword
      ME_CONFIG_MONGODB_URL: mongodb://chatuser:chatpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
